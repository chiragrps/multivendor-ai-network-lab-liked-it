version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DCN Network Tool — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   app   — Flask/Gunicorn backend (port 5757) — SSH to devices, AI queries
#   jmcp  — Junos MCP Server sidecar (port 30030) — read-only Junos CLI via MCP
#   nginx — Reverse proxy (port 80) — serves static files + proxies /api/
#
# Quick start:
#   1. Copy .env.example → .env, fill in SSH key path + LibreNMS tokens
#   2. Place data files:
#      - data/ssh/netlab_admin            (SSH private key)
#      - data/inventory/*.csv          (SecureCRT + NetBox exports)
#      - data/configs/junos/*.txt      (Junos config baselines)
#      - data/configs/eos/*.txt        (EOS config baselines)
#   3. docker compose up -d --build
#   4. Open http://localhost (or :5757 direct)
#
# LLM (optional):
#   Docker Model Runner must be running on the host:
#     docker model pull ai/qwen3
#   Then set LLM_ENABLED=true in .env
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Main Application ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: dcn-network-tool
    restart: unless-stopped
    env_file: .env
    environment:
      # JMCP sidecar address (docker service name)
      - JMCP_URL=http://jmcp:30030
      - JMCP_ENABLED=true
    extra_hosts:
      # Allows container to reach Docker Model Runner on the host
      - "host.docker.internal:host-gateway"
    volumes:
      # SSH key for device access
      - ${DCN_SSH_KEY_HOST:-./data/ssh}:/data/ssh:ro
      # Device inventory CSVs
      - ${DCN_INVENTORY_HOST:-./data/inventory}:/data/inventory:ro
      # Device config baselines (for config drift detection + EOS device detection)
      - ${DCN_CONFIGS_HOST:-./data/configs}:/data/configs:ro
      # Shared JMCP config volume — app writes devices.json, jmcp reads it
      - jmcp-config:/app/jmcp/config
    ports:
      - "${DCN_PORT:-5757}:5757"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5757/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      jmcp:
        condition: service_healthy
    networks:
      - dcn-net

  # ── Junos MCP Server (Read-Only Sidecar) ──────────────────────────────────
  jmcp:
    build: ./jmcp
    container_name: dcn-jmcp
    restart: unless-stopped
    volumes:
      # SSH key for device access (same key as main app)
      - ${DCN_SSH_KEY_HOST:-./data/ssh}:/data/ssh:ro
      # Auto-generated devices.json from DCN inventory (written by app service)
      - jmcp-config:/app/config
    environment:
      - JUNOS_TIMEOUT=60
      - JMCP_STATELESS=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:30030/mcp/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - dcn-net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dcn-nginx
    restart: unless-stopped
    ports:
      - "${DCN_PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve static files directly from nginx
      - ./index.html:/app/static/index.html:ro
      - ./app.js:/app/static/app.js:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dcn-net

volumes:
  jmcp-config:

networks:
  dcn-net:
    driver: bridge
