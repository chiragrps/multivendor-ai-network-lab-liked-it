frr version 9.1
frr defaults traditional
hostname de-fra-edge-01
log syslog informational
service integrated-vtysh-config
!
ntp server 10.200.0.1
ntp server 10.200.0.2
!
agentx
!
interface lo
 ip address 10.255.0.6/32
!
interface eth0
 ip ospf area 0
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ip ospf bfd
 mtu 9000
!
interface eth1
 mtu 9000
!
router ospf
 ospf router-id 10.255.0.6
 passive-interface lo
!
router bgp 65006
 bgp router-id 10.200.0.21
 bgp log-neighbor-changes
 bgp graceful-restart
 no bgp ebgp-requires-policy
 neighbor 10.200.0.11 remote-as 65001
 neighbor 10.200.0.11 description de-fra-core-01
 neighbor 10.200.0.11 timers 10 30
 neighbor 10.200.0.11 password Gesh!Bgp65001x65006
 neighbor 10.200.0.11 bfd
 neighbor 10.200.0.12 remote-as 65002
 neighbor 10.200.0.12 description de-fra-core-02
 neighbor 10.200.0.12 timers 10 30
 neighbor 10.200.0.12 password Gesh!Bgp65002x65006
 neighbor 10.200.0.12 bfd
 neighbor 10.200.0.33 remote-as 65009
 neighbor 10.200.0.33 description de-fra-dist-01
 neighbor 10.200.0.33 timers 10 30
 neighbor 10.200.0.33 password Gesh!Bgp65006x65009
 neighbor 10.200.0.33 bfd
 !
 address-family ipv4 unicast
  network 10.50.1.0/24
  network 10.255.0.6/32
  neighbor 10.200.0.11 activate
  neighbor 10.200.0.11 soft-reconfiguration inbound
  neighbor 10.200.0.12 activate
  neighbor 10.200.0.12 soft-reconfiguration inbound
  neighbor 10.200.0.33 activate
  neighbor 10.200.0.33 soft-reconfiguration inbound
 exit-address-family
!
bfd
 peer 10.200.0.11
  receive-interval 100
  transmit-interval 100
  detect-multiplier 3
 !
 peer 10.200.0.12
  receive-interval 100
  transmit-interval 100
  detect-multiplier 3
 !
 peer 10.200.0.33
  receive-interval 100
  transmit-interval 100
  detect-multiplier 3
 !
!
ip route 10.50.1.0/24 Null0
!
line vty
!
