frr version 8.4_git
frr defaults datacenter
hostname leaf6
log syslog informational
service integrated-vtysh-config
!
vrf TENANT-A
 vni 50001
exit-vrf
!
interface br-vlan30
 ip address 10.10.30.254/24
exit
!
interface eth1
 description to spine1-srl
 ip address 10.0.1.11/31
 ipv6 address fd00:dc1:1:6::1/127
exit
!
interface eth2
 description to spine2-ceos
 ip address 10.0.2.11/31
 ipv6 address fd00:dc1:2:6::1/127
exit
!
interface eth3
 description to spine3-frr
 ip address 10.0.3.11/31
 ipv6 address fd00:dc1:3:6::1/127
exit
!
interface eth4
 description host5-leg (ESI-LAG rack-3)
 evpn mh es-id 1
 evpn mh es-sys-mac 00:33:33:33:11:11
exit
!
interface eth5
 description host6-leg (ESI-LAG rack-3)
 evpn mh es-id 2
 evpn mh es-sys-mac 00:33:33:33:22:22
exit
!
interface lo
 ip address 10.255.1.6/32
 ipv6 address fd00:dc1::16/128
exit
!
interface lo1
 ip address 10.255.100.6/32
exit
!
ip prefix-list LOOPBACKS seq 10 permit 10.255.0.0/16 le 32
!
ipv6 prefix-list LOOPBACKS6 seq 10 permit fd00:dc1::/48 le 128
!
route-map EXPORT_LO permit 10
 match ip address prefix-list LOOPBACKS
exit
!
route-map EXPORT_LO permit 20
 match ipv6 address prefix-list LOOPBACKS6
exit
!
router bgp 65006
 bgp router-id 10.255.1.6
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 neighbor EVPN peer-group
 neighbor EVPN remote-as 65100
 neighbor EVPN ebgp-multihop 3
 neighbor EVPN update-source lo
 neighbor EVPN timers 3 9
 neighbor SPINE peer-group
 neighbor SPINE timers 3 9
 neighbor 10.255.0.1 peer-group EVPN
 neighbor 10.255.0.1 description spine1-RR
 neighbor 10.255.0.2 peer-group EVPN
 neighbor 10.255.0.2 description spine2-RR
 neighbor 10.255.0.3 peer-group EVPN
 neighbor 10.255.0.3 description spine3-RR
 neighbor 10.0.1.10 remote-as 65100
 neighbor 10.0.1.10 peer-group SPINE
 neighbor 10.0.1.10 description spine1-srl
 neighbor 10.0.2.10 remote-as 65100
 neighbor 10.0.2.10 peer-group SPINE
 neighbor 10.0.2.10 description spine2-ceos
 neighbor 10.0.3.10 remote-as 65100
 neighbor 10.0.3.10 peer-group SPINE
 neighbor 10.0.3.10 description spine3-frr
 neighbor fd00:dc1:1:6::0 remote-as 65100
 neighbor fd00:dc1:1:6::0 peer-group SPINE
 neighbor fd00:dc1:1:6::0 description spine1-srl-v6
 neighbor fd00:dc1:2:6::0 remote-as 65100
 neighbor fd00:dc1:2:6::0 peer-group SPINE
 neighbor fd00:dc1:2:6::0 description spine2-ceos-v6
 neighbor fd00:dc1:3:6::0 remote-as 65100
 neighbor fd00:dc1:3:6::0 peer-group SPINE
 neighbor fd00:dc1:3:6::0 description spine3-frr-v6
 !
 address-family ipv4 unicast
  redistribute connected route-map EXPORT_LO
  neighbor SPINE activate
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute connected route-map EXPORT_LO
  neighbor fd00:dc1:1:6::0 activate
  neighbor fd00:dc1:2:6::0 activate
  neighbor fd00:dc1:3:6::0 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN activate
  advertise-all-vni
  vni 10030
   rd 10.255.1.6:10030
   route-target import 1:10030
   route-target export 1:10030
  exit-vni
  advertise-svi-ip
 exit-address-family
exit
!
router bgp 65006 vrf TENANT-A
 bgp router-id 10.255.1.6
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.255.1.6:1
  route-target import 1:50001
  route-target export 1:50001
 exit-address-family
exit
!
