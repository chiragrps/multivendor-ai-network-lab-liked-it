# Nokia SR Linux — Leaf2 (VTEP)
# AS 65002 eBGP underlay + eBGP EVPN overlay
# ESI-LAG: Rack-1 pair with leaf1 (cEOS), VLAN 10

set / system information description "Leaf-2 Nokia SR Linux — VTEP"

# Loopback
set / interface system0 admin-state enable
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.255.1.2/32

# Leaf-to-Spine P2P interfaces
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 description "to spine1-srl"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.0.1.3/31

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 description "to spine2-ceos"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.0.2.3/31

set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 description "to spine3-frr"
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 address 10.0.3.3/31

# ESI-LAG: host1 on lag1 (e1-4), host2 on lag2 (e1-5)
set / interface ethernet-1/4 admin-state enable
set / interface ethernet-1/4 ethernet aggregate-id lag1

set / interface ethernet-1/5 admin-state enable
set / interface ethernet-1/5 ethernet aggregate-id lag2

set / interface lag1 admin-state enable
set / interface lag1 description "host1-bond ESI-LAG rack-1"
set / interface lag1 lag lag-type lacp
set / interface lag1 lag lacp-fallback-mode static
set / interface lag1 lag lacp-fallback-timeout 90
set / interface lag1 lag min-links 1
set / interface lag1 vlan-tagging false
set / interface lag1 subinterface 0 type bridged
set / interface lag1 subinterface 0 admin-state enable

set / interface lag2 admin-state enable
set / interface lag2 description "host2-bond ESI-LAG rack-1"
set / interface lag2 lag lag-type lacp
set / interface lag2 lag lacp-fallback-mode static
set / interface lag2 lag lacp-fallback-timeout 90
set / interface lag2 lag min-links 1
set / interface lag2 vlan-tagging false
set / interface lag2 subinterface 0 type bridged
set / interface lag2 subinterface 0 admin-state enable

# Ethernet Segments (must match partner leaf1 cEOS ESI)
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host1-es admin-state enable
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host1-es esi 00:11:11:11:11:11:11:11:11:11
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host1-es multi-homing-mode all-active
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host1-es interface lag1

set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host2-es admin-state enable
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host2-es esi 00:11:11:11:11:11:11:11:22:22
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host2-es multi-homing-mode all-active
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment host2-es interface lag2

# VTEP loopback for VXLAN
set / interface lo1 admin-state enable
set / interface lo1 subinterface 0 admin-state enable
set / interface lo1 subinterface 0 ipv4 admin-state enable
set / interface lo1 subinterface 0 ipv4 address 10.255.100.2/32

# VXLAN tunnel interface
set / tunnel-interface vxlan1 vxlan-interface 10010 type bridged
set / tunnel-interface vxlan1 vxlan-interface 10010 ingress vni 10010

# MAC-VRF for VLAN 10
set / network-instance mac-vrf-10 type mac-vrf
set / network-instance mac-vrf-10 admin-state enable
set / network-instance mac-vrf-10 interface lag1.0
set / network-instance mac-vrf-10 interface lag2.0
set / network-instance mac-vrf-10 vxlan-interface vxlan1.10010
set / network-instance mac-vrf-10 protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance mac-vrf-10 protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.10010
set / network-instance mac-vrf-10 protocols bgp-evpn bgp-instance 1 evi 10010
set / network-instance mac-vrf-10 protocols bgp-vpn bgp-instance 1 route-target export-rt target:1:10010
set / network-instance mac-vrf-10 protocols bgp-vpn bgp-instance 1 route-target import-rt target:1:10010

# Default network instance (underlay)
set / network-instance default type default
set / network-instance default admin-state enable
set / network-instance default interface system0.0
set / network-instance default interface lo1.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface ethernet-1/3.0

# BGP global
set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65002
set / network-instance default protocols bgp router-id 10.255.1.2
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp afi-safi evpn admin-state enable

# eBGP Underlay to spines
set / network-instance default protocols bgp group spine export-policy [export-loopback]
set / network-instance default protocols bgp group spine import-policy [accept-all]
set / network-instance default protocols bgp group spine afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp neighbor 10.0.1.2 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.2 peer-as 65100
set / network-instance default protocols bgp neighbor 10.0.1.2 peer-group spine
set / network-instance default protocols bgp neighbor 10.0.2.2 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.2.2 peer-as 65100
set / network-instance default protocols bgp neighbor 10.0.2.2 peer-group spine
set / network-instance default protocols bgp neighbor 10.0.3.2 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.3.2 peer-as 65100
set / network-instance default protocols bgp neighbor 10.0.3.2 peer-group spine

# eBGP EVPN Overlay to spine RRs (loopback peering, multihop)
set / network-instance default protocols bgp group evpn-rr transport local-address 10.255.1.2
set / network-instance default protocols bgp group evpn-rr multihop admin-state enable
set / network-instance default protocols bgp group evpn-rr multihop maximum-hops 3
set / network-instance default protocols bgp group evpn-rr afi-safi evpn admin-state enable
set / network-instance default protocols bgp group evpn-rr export-policy [accept-all]
set / network-instance default protocols bgp group evpn-rr import-policy [accept-all]

set / network-instance default protocols bgp neighbor 10.255.0.1 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.0.1 peer-as 65100
set / network-instance default protocols bgp neighbor 10.255.0.1 peer-group evpn-rr
set / network-instance default protocols bgp neighbor 10.255.0.2 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.0.2 peer-as 65100
set / network-instance default protocols bgp neighbor 10.255.0.2 peer-group evpn-rr
set / network-instance default protocols bgp neighbor 10.255.0.3 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.0.3 peer-as 65100
set / network-instance default protocols bgp neighbor 10.255.0.3 peer-group evpn-rr

# Routing policies
set / routing-policy policy export-loopback statement 10 match protocol local
set / routing-policy policy export-loopback statement 10 action policy-result accept
set / routing-policy policy accept-all default-action policy-result accept

# SNMP Monitoring
set / system snmp admin-state enable
set / system snmp community GESH-DC1-RO permission r
set / system snmp network-instance mgmt admin-state enable
