! Arista cEOS — Leaf1 (VTEP)
! AS 65001 eBGP underlay + eBGP EVPN overlay
! ESI-LAG: Rack-1 pair with leaf2 (SRL), VLAN 10
!
hostname leaf1
!
snmp-server community GESH-DC1-RO ro
snmp-server host 172.20.20.1 version 2c GESH-DC1-RO udp-port 1162
snmp-server enable traps bgp
!
spanning-tree mode mstp
!
vlan 10
!
interface Loopback0
 ip address 10.255.1.1/32
!
interface Ethernet1
 description to spine1-srl
 mtu 9214
 no switchport
 ip address 10.0.1.1/31
!
interface Ethernet2
 description to spine2-ceos
 mtu 9214
 no switchport
 ip address 10.0.2.1/31
!
interface Ethernet3
 description to spine3-frr
 mtu 9214
 no switchport
 ip address 10.0.3.1/31
!
! ESI-LAG: host1 on Port-Channel1, host2 on Port-Channel2
interface Port-Channel1
 description host1-bond (ESI-LAG rack-1)
 switchport access vlan 10
 evpn ethernet-segment
  identifier 0011:1111:1111:1111:1111
  route-target import 11:11:11:11:11:11
 lacp system-id 0011.1111.1111
!
interface Port-Channel2
 description host2-bond (ESI-LAG rack-1)
 switchport access vlan 10
 evpn ethernet-segment
  identifier 0011:1111:1111:1111:2222
  route-target import 11:11:11:11:22:22
 lacp system-id 0011.1111.2222
!
interface Ethernet4
 description host1-leg
 channel-group 1 mode active
!
interface Ethernet5
 description host2-leg
 channel-group 2 mode active
!
interface Vxlan1
 vxlan source-interface Loopback0
 vxlan vlan 10 vni 10010
!
ip routing
!
ip prefix-list LOOPBACKS seq 10 permit 10.255.0.0/16 le 32
!
route-map EXPORT_LO permit 10
 match ip address prefix-list LOOPBACKS
!
router bgp 65001
 router-id 10.255.1.1
 no bgp default ipv4-unicast
 neighbor SPINE peer group
 neighbor SPINE send-community
 neighbor 10.0.1.0 peer group SPINE
 neighbor 10.0.1.0 remote-as 65100
 neighbor 10.0.1.0 description spine1-srl
 neighbor 10.0.2.0 peer group SPINE
 neighbor 10.0.2.0 remote-as 65100
 neighbor 10.0.2.0 description spine2-ceos
 neighbor 10.0.3.0 peer group SPINE
 neighbor 10.0.3.0 remote-as 65100
 neighbor 10.0.3.0 description spine3-frr
 neighbor EVPN peer group
 neighbor EVPN update-source Loopback0
 neighbor EVPN ebgp-multihop 3
 neighbor EVPN send-community extended
 neighbor 10.255.0.1 peer group EVPN
 neighbor 10.255.0.1 remote-as 65100
 neighbor 10.255.0.1 description spine1-RR
 neighbor 10.255.0.2 peer group EVPN
 neighbor 10.255.0.2 remote-as 65100
 neighbor 10.255.0.2 description spine2-RR
 neighbor 10.255.0.3 peer group EVPN
 neighbor 10.255.0.3 remote-as 65100
 neighbor 10.255.0.3 description spine3-RR
 !
 address-family ipv4
  neighbor SPINE activate
  redistribute connected route-map EXPORT_LO
 !
 vlan 10
  rd 10.255.1.1:10010
  route-target both 1:10010
  redistribute learned
 !
 address-family evpn
  neighbor EVPN activate
!
