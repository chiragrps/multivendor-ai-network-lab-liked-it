! Arista cEOS — Leaf4 (VTEP)
! AS 65004 eBGP underlay + eBGP EVPN overlay
! ESI-LAG: Rack-2 pair with leaf3 (FRR), VLAN 20
!
hostname leaf4
!
snmp-server community GESH-DC1-RO ro
snmp-server host 172.20.20.1 version 2c GESH-DC1-RO udp-port 1162
snmp-server enable traps bgp
!
spanning-tree mode mstp
!
vlan 20
!
interface Loopback0
 ip address 10.255.1.4/32
!
interface Ethernet1
 description to spine1-srl
 mtu 9214
 no switchport
 ip address 10.0.1.7/31
!
interface Ethernet2
 description to spine2-ceos
 mtu 9214
 no switchport
 ip address 10.0.2.7/31
!
interface Ethernet3
 description to spine3-frr
 mtu 9214
 no switchport
 ip address 10.0.3.7/31
!
! ESI-LAG: host3 on Port-Channel1, host4 on Port-Channel2
interface Port-Channel1
 description host3-bond (ESI-LAG rack-2)
 switchport access vlan 20
 evpn ethernet-segment
  identifier 0022:2222:2222:2222:1111
  route-target import 22:22:22:22:11:11
 lacp system-id 0022.2222.1111
!
interface Port-Channel2
 description host4-bond (ESI-LAG rack-2)
 switchport access vlan 20
 evpn ethernet-segment
  identifier 0022:2222:2222:2222:2222
  route-target import 22:22:22:22:22:22
 lacp system-id 0022.2222.2222
!
interface Ethernet5
 description host3-leg
 channel-group 1 mode active
!
interface Ethernet6
 description host4-leg
 channel-group 2 mode active
!
interface Vxlan1
 vxlan source-interface Loopback0
 vxlan vlan 20 vni 10020
!
ip routing
!
ip prefix-list LOOPBACKS seq 10 permit 10.255.0.0/16 le 32
!
route-map EXPORT_LO permit 10
 match ip address prefix-list LOOPBACKS
!
router bgp 65004
 router-id 10.255.1.4
 no bgp default ipv4-unicast
 neighbor SPINE peer group
 neighbor SPINE send-community
 neighbor 10.0.1.6 peer group SPINE
 neighbor 10.0.1.6 remote-as 65100
 neighbor 10.0.1.6 description spine1-srl
 neighbor 10.0.2.6 peer group SPINE
 neighbor 10.0.2.6 remote-as 65100
 neighbor 10.0.2.6 description spine2-ceos
 neighbor 10.0.3.6 peer group SPINE
 neighbor 10.0.3.6 remote-as 65100
 neighbor 10.0.3.6 description spine3-frr
 neighbor EVPN peer group
 neighbor EVPN update-source Loopback0
 neighbor EVPN ebgp-multihop 3
 neighbor EVPN send-community extended
 neighbor 10.255.0.1 peer group EVPN
 neighbor 10.255.0.1 remote-as 65100
 neighbor 10.255.0.1 description spine1-RR
 neighbor 10.255.0.2 peer group EVPN
 neighbor 10.255.0.2 remote-as 65100
 neighbor 10.255.0.2 description spine2-RR
 neighbor 10.255.0.3 peer group EVPN
 neighbor 10.255.0.3 remote-as 65100
 neighbor 10.255.0.3 description spine3-RR
 !
 address-family ipv4
  neighbor SPINE activate
  redistribute connected route-map EXPORT_LO
 !
 vlan 20
  rd 10.255.1.4:10020
  route-target both 1:10020
  redistribute learned
 !
 address-family evpn
  neighbor EVPN activate
!
