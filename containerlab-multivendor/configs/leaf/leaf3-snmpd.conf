# net-snmp agent config for leaf3 (FRR)
# SNMP traps sent to DCN Tool SNMP receiver on host

rocommunity GESH-DC1-RO
syslocation GESH-DC1-LEAF-RACK2
syscontact gesh-noc@gesh.io

# Trap destination — host management gateway → DCN tool UDP :1162
trap2sink 172.20.20.1:1162 GESH-DC1-RO

# Enable standard traps
authtrapenable 1

# AgentX — allow FRR daemons to register as subagents
master agentx
agentXSocket /var/agentx/master

# BGP MIB trap events
trapsink 172.20.20.1:1162 GESH-DC1-RO

# Interface link traps
linkUpDownNotifications yes
