! Arista cEOS — Spine2 (Route Reflector)
! AS 65100 eBGP underlay + eBGP EVPN overlay RR
!
hostname spine2
!
snmp-server contact gesh-noc@gesh.io
snmp-server location GESH-DC1-SPINE-RACK
snmp-server community GESH-DC1-RO ro
snmp-server host 172.20.20.1 version 2c GESH-DC1-RO udp-port 1162
snmp-server enable traps bgp
snmp-server enable traps snmp authentication
!
spanning-tree mode mstp
!
interface Loopback0
 ip address 10.255.0.2/32
 ipv6 address fd00:dc1::2/128
!
interface Ethernet1
 description to leaf1-ceos
 mtu 9214
 no switchport
 ip address 10.0.2.0/31
 ipv6 address fd00:dc1:2:1::0/127
!
interface Ethernet2
 description to leaf2-srl
 mtu 9214
 no switchport
 ip address 10.0.2.2/31
 ipv6 address fd00:dc1:2:2::0/127
!
interface Ethernet3
 description to leaf3-frr
 mtu 9214
 no switchport
 ip address 10.0.2.4/31
 ipv6 address fd00:dc1:2:3::0/127
!
interface Ethernet4
 description to leaf4-ceos
 mtu 9214
 no switchport
 ip address 10.0.2.6/31
 ipv6 address fd00:dc1:2:4::0/127
!
interface Ethernet5
 description to leaf5-srl
 mtu 9214
 no switchport
 ip address 10.0.2.8/31
 ipv6 address fd00:dc1:2:5::0/127
!
interface Ethernet6
 description to leaf6-frr
 mtu 9214
 no switchport
 ip address 10.0.2.10/31
 ipv6 address fd00:dc1:2:6::0/127
!
ip routing
!
ipv6 unicast-routing
!
ip prefix-list LOOPBACKS seq 10 permit 10.255.0.0/16 le 32
!
ipv6 prefix-list LOOPBACKS6 seq 10 permit fd00:dc1::/48 le 128
!
route-map EXPORT_LO permit 10
 match ip address prefix-list LOOPBACKS
!
route-map EXPORT_LO permit 20
 match ipv6 address prefix-list LOOPBACKS6
!
router bgp 65100
 router-id 10.255.0.2
 no bgp default ipv4-unicast
 maximum-paths 4 ecmp 64
 neighbor UNDERLAY peer group
 neighbor UNDERLAY send-community
 neighbor UNDERLAY maximum-routes 12000
 neighbor 10.0.2.1 peer group UNDERLAY
 neighbor 10.0.2.1 remote-as 65001
 neighbor 10.0.2.1 description leaf1-ceos
 neighbor 10.0.2.3 peer group UNDERLAY
 neighbor 10.0.2.3 remote-as 65002
 neighbor 10.0.2.3 description leaf2-srl
 neighbor 10.0.2.5 peer group UNDERLAY
 neighbor 10.0.2.5 remote-as 65003
 neighbor 10.0.2.5 description leaf3-frr
 neighbor 10.0.2.7 peer group UNDERLAY
 neighbor 10.0.2.7 remote-as 65004
 neighbor 10.0.2.7 description leaf4-ceos
 neighbor 10.0.2.9 peer group UNDERLAY
 neighbor 10.0.2.9 remote-as 65005
 neighbor 10.0.2.9 description leaf5-srl
 neighbor 10.0.2.11 peer group UNDERLAY
 neighbor 10.0.2.11 remote-as 65006
 neighbor 10.0.2.11 description leaf6-frr
 neighbor OVERLAY peer group
 neighbor OVERLAY update-source Loopback0
 neighbor OVERLAY ebgp-multihop 3
 neighbor OVERLAY route-reflector-client
 neighbor OVERLAY send-community extended
 neighbor OVERLAY maximum-routes 12000
 neighbor 10.255.1.1 peer group OVERLAY
 neighbor 10.255.1.1 remote-as 65001
 neighbor 10.255.1.1 description leaf1-EVPN
 neighbor 10.255.1.2 peer group OVERLAY
 neighbor 10.255.1.2 remote-as 65002
 neighbor 10.255.1.2 description leaf2-EVPN
 neighbor 10.255.1.3 peer group OVERLAY
 neighbor 10.255.1.3 remote-as 65003
 neighbor 10.255.1.3 description leaf3-EVPN
 neighbor 10.255.1.4 peer group OVERLAY
 neighbor 10.255.1.4 remote-as 65004
 neighbor 10.255.1.4 description leaf4-EVPN
 neighbor 10.255.1.5 peer group OVERLAY
 neighbor 10.255.1.5 remote-as 65005
 neighbor 10.255.1.5 description leaf5-EVPN
 neighbor 10.255.1.6 peer group OVERLAY
 neighbor 10.255.1.6 remote-as 65006
 neighbor 10.255.1.6 description leaf6-EVPN
 neighbor LEAF6 peer group
 neighbor LEAF6 send-community
 neighbor LEAF6 maximum-routes 12000
 neighbor fd00:dc1:2:1::1 peer group LEAF6
 neighbor fd00:dc1:2:1::1 remote-as 65001
 neighbor fd00:dc1:2:1::1 description leaf1-ceos-v6
 neighbor fd00:dc1:2:2::1 peer group LEAF6
 neighbor fd00:dc1:2:2::1 remote-as 65002
 neighbor fd00:dc1:2:2::1 description leaf2-srl-v6
 neighbor fd00:dc1:2:3::1 peer group LEAF6
 neighbor fd00:dc1:2:3::1 remote-as 65003
 neighbor fd00:dc1:2:3::1 description leaf3-frr-v6
 neighbor fd00:dc1:2:4::1 peer group LEAF6
 neighbor fd00:dc1:2:4::1 remote-as 65004
 neighbor fd00:dc1:2:4::1 description leaf4-ceos-v6
 neighbor fd00:dc1:2:5::1 peer group LEAF6
 neighbor fd00:dc1:2:5::1 remote-as 65005
 neighbor fd00:dc1:2:5::1 description leaf5-srl-v6
 neighbor fd00:dc1:2:6::1 peer group LEAF6
 neighbor fd00:dc1:2:6::1 remote-as 65006
 neighbor fd00:dc1:2:6::1 description leaf6-frr-v6
 !
 address-family ipv4
  neighbor UNDERLAY activate
  redistribute connected route-map EXPORT_LO
 !
 address-family ipv6
  neighbor LEAF6 activate
  redistribute connected route-map EXPORT_LO
 !
 address-family evpn
  neighbor OVERLAY activate
!
