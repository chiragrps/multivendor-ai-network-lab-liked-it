# Nokia SR Linux — Spine1 (Route Reflector)
# AS 65100 eBGP underlay + eBGP EVPN overlay RR

set / system information location "GESH-DC1-SPINE-RACK"
set / system information description "Spine-1 Nokia SR Linux — EVPN Route Reflector"

# Loopback
set / interface system0 admin-state enable
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.255.0.1/32

# Spine-to-Leaf P2P interfaces (e1-1 through e1-6)
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 description "to leaf1-ceos"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.0.1.0/31

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 description "to leaf2-srl"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.0.1.2/31

set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 description "to leaf3-frr"
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 address 10.0.1.4/31

set / interface ethernet-1/4 admin-state enable
set / interface ethernet-1/4 description "to leaf4-ceos"
set / interface ethernet-1/4 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/4 subinterface 0 ipv4 address 10.0.1.6/31

set / interface ethernet-1/5 admin-state enable
set / interface ethernet-1/5 description "to leaf5-srl"
set / interface ethernet-1/5 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/5 subinterface 0 ipv4 address 10.0.1.8/31

set / interface ethernet-1/6 admin-state enable
set / interface ethernet-1/6 description "to leaf6-frr"
set / interface ethernet-1/6 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/6 subinterface 0 ipv4 address 10.0.1.10/31

# Default network instance with all interfaces
set / network-instance default type default
set / network-instance default admin-state enable
set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface ethernet-1/3.0
set / network-instance default interface ethernet-1/4.0
set / network-instance default interface ethernet-1/5.0
set / network-instance default interface ethernet-1/6.0

# BGP global
set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65100
set / network-instance default protocols bgp router-id 10.255.0.1
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp afi-safi evpn admin-state enable

# eBGP Underlay
set / network-instance default protocols bgp group underlay-leafs export-policy [export-loopback]
set / network-instance default protocols bgp group underlay-leafs import-policy [accept-all]
set / network-instance default protocols bgp group underlay-leafs afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp neighbor 10.0.1.1 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.1 peer-as 65001
set / network-instance default protocols bgp neighbor 10.0.1.1 peer-group underlay-leafs
set / network-instance default protocols bgp neighbor 10.0.1.3 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.3 peer-as 65002
set / network-instance default protocols bgp neighbor 10.0.1.3 peer-group underlay-leafs
set / network-instance default protocols bgp neighbor 10.0.1.5 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.5 peer-as 65003
set / network-instance default protocols bgp neighbor 10.0.1.5 peer-group underlay-leafs
set / network-instance default protocols bgp neighbor 10.0.1.7 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.7 peer-as 65004
set / network-instance default protocols bgp neighbor 10.0.1.7 peer-group underlay-leafs
set / network-instance default protocols bgp neighbor 10.0.1.9 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.9 peer-as 65005
set / network-instance default protocols bgp neighbor 10.0.1.9 peer-group underlay-leafs
set / network-instance default protocols bgp neighbor 10.0.1.11 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.1.11 peer-as 65006
set / network-instance default protocols bgp neighbor 10.0.1.11 peer-group underlay-leafs

# eBGP EVPN Overlay — Route Reflector (loopback peering, multihop)
set / network-instance default protocols bgp group overlay-rr transport local-address 10.255.0.1
set / network-instance default protocols bgp group overlay-rr multihop admin-state enable
set / network-instance default protocols bgp group overlay-rr multihop maximum-hops 3
set / network-instance default protocols bgp group overlay-rr route-reflector client true
set / network-instance default protocols bgp group overlay-rr route-reflector cluster-id 10.255.0.1
set / network-instance default protocols bgp group overlay-rr afi-safi evpn admin-state enable

set / network-instance default protocols bgp neighbor 10.255.1.1 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.1 peer-as 65001
set / network-instance default protocols bgp neighbor 10.255.1.1 peer-group overlay-rr
set / network-instance default protocols bgp neighbor 10.255.1.2 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.2 peer-as 65002
set / network-instance default protocols bgp neighbor 10.255.1.2 peer-group overlay-rr
set / network-instance default protocols bgp neighbor 10.255.1.3 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.3 peer-as 65003
set / network-instance default protocols bgp neighbor 10.255.1.3 peer-group overlay-rr
set / network-instance default protocols bgp neighbor 10.255.1.4 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.4 peer-as 65004
set / network-instance default protocols bgp neighbor 10.255.1.4 peer-group overlay-rr
set / network-instance default protocols bgp neighbor 10.255.1.5 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.5 peer-as 65005
set / network-instance default protocols bgp neighbor 10.255.1.5 peer-group overlay-rr
set / network-instance default protocols bgp neighbor 10.255.1.6 admin-state enable
set / network-instance default protocols bgp neighbor 10.255.1.6 peer-as 65006
set / network-instance default protocols bgp neighbor 10.255.1.6 peer-group overlay-rr

# Routing policies
set / routing-policy policy export-loopback statement 10 match protocol local
set / routing-policy policy export-loopback statement 10 action policy-result accept
set / routing-policy policy accept-all default-action policy-result accept

# SNMP Monitoring
set / system snmp admin-state enable
set / system snmp community GESH-DC1-RO permission r
set / system snmp network-instance mgmt admin-state enable
set / system snmp contact "gesh-noc@gesh.io"
set / system snmp location "GESH-DC1-SPINE-RACK"
set / system snmp trap-group GESH-TRAPS admin-state enable
set / system snmp trap-group GESH-TRAPS remote-server 172.20.20.1 port 1162 community-string GESH-DC1-RO
