frr version 8.4_git
frr defaults datacenter
hostname spine3
log syslog informational
service integrated-vtysh-config
!
interface eth3
 description to leaf1-ceos
 ip address 10.0.3.0/31
 ipv6 address fd00:dc1:3:1::0/127
exit
!
interface eth4
 description to leaf2-srl
 ip address 10.0.3.2/31
 ipv6 address fd00:dc1:3:2::0/127
exit
!
interface eth5
 description to leaf3-frr
 ip address 10.0.3.4/31
 ipv6 address fd00:dc1:3:3::0/127
exit
!
interface eth6
 description to leaf4-ceos
 ip address 10.0.3.6/31
 ipv6 address fd00:dc1:3:4::0/127
exit
!
interface eth7
 description to leaf5-srl
 ip address 10.0.3.8/31
 ipv6 address fd00:dc1:3:5::0/127
exit
!
interface eth8
 description to leaf6-frr
 ip address 10.0.3.10/31
 ipv6 address fd00:dc1:3:6::0/127
exit
!
interface lo
 ip address 10.255.0.3/32
 ipv6 address fd00:dc1::3/128
exit
!
router bgp 65100
 bgp router-id 10.255.0.3
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 neighbor OVERLAY peer-group
 neighbor OVERLAY ebgp-multihop 255
 neighbor OVERLAY update-source lo
 neighbor OVERLAY timers 3 9
 neighbor UNDERLAY peer-group
 neighbor UNDERLAY timers 3 9
 neighbor 10.255.1.1 remote-as 65001
 neighbor 10.255.1.1 peer-group OVERLAY
 neighbor 10.255.1.2 remote-as 65002
 neighbor 10.255.1.2 peer-group OVERLAY
 neighbor 10.255.1.3 remote-as 65003
 neighbor 10.255.1.3 peer-group OVERLAY
 neighbor 10.255.1.4 remote-as 65004
 neighbor 10.255.1.4 peer-group OVERLAY
 neighbor 10.255.1.5 remote-as 65005
 neighbor 10.255.1.5 peer-group OVERLAY
 neighbor 10.255.1.6 remote-as 65006
 neighbor 10.255.1.6 peer-group OVERLAY
 neighbor 10.0.3.1 remote-as 65001
 neighbor 10.0.3.1 peer-group UNDERLAY
 neighbor 10.0.3.1 description leaf1-ceos
 neighbor 10.0.3.3 remote-as 65002
 neighbor 10.0.3.3 peer-group UNDERLAY
 neighbor 10.0.3.3 description leaf2-srl
 neighbor 10.0.3.5 remote-as 65003
 neighbor 10.0.3.5 peer-group UNDERLAY
 neighbor 10.0.3.5 description leaf3-frr
 neighbor 10.0.3.7 remote-as 65004
 neighbor 10.0.3.7 peer-group UNDERLAY
 neighbor 10.0.3.7 description leaf4-ceos
 neighbor 10.0.3.9 remote-as 65005
 neighbor 10.0.3.9 peer-group UNDERLAY
 neighbor 10.0.3.9 description leaf5-srl
 neighbor 10.0.3.11 remote-as 65006
 neighbor 10.0.3.11 peer-group UNDERLAY
 neighbor 10.0.3.11 description leaf6-frr
 neighbor fd00:dc1:3:1::1 remote-as 65001
 neighbor fd00:dc1:3:1::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:1::1 description leaf1-ceos-v6
 neighbor fd00:dc1:3:2::1 remote-as 65002
 neighbor fd00:dc1:3:2::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:2::1 description leaf2-srl-v6
 neighbor fd00:dc1:3:3::1 remote-as 65003
 neighbor fd00:dc1:3:3::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:3::1 description leaf3-frr-v6
 neighbor fd00:dc1:3:4::1 remote-as 65004
 neighbor fd00:dc1:3:4::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:4::1 description leaf4-ceos-v6
 neighbor fd00:dc1:3:5::1 remote-as 65005
 neighbor fd00:dc1:3:5::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:5::1 description leaf5-srl-v6
 neighbor fd00:dc1:3:6::1 remote-as 65006
 neighbor fd00:dc1:3:6::1 peer-group UNDERLAY
 neighbor fd00:dc1:3:6::1 description leaf6-frr-v6
 !
 address-family ipv4 unicast
  redistribute connected route-map EXPORT_LO
  neighbor UNDERLAY activate
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute connected route-map EXPORT_LO
  neighbor fd00:dc1:3:1::1 activate
  neighbor fd00:dc1:3:2::1 activate
  neighbor fd00:dc1:3:3::1 activate
  neighbor fd00:dc1:3:4::1 activate
  neighbor fd00:dc1:3:5::1 activate
  neighbor fd00:dc1:3:6::1 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor OVERLAY activate
  neighbor OVERLAY route-reflector-client
 exit-address-family
exit
!
ip prefix-list LOOPBACKS seq 10 permit 10.255.0.0/16 le 32
!
ipv6 prefix-list LOOPBACKS6 seq 10 permit fd00:dc1::/48 le 128
!
route-map EXPORT_LO permit 10
 match ip address prefix-list LOOPBACKS
exit
!
route-map EXPORT_LO permit 20
 match ipv6 address prefix-list LOOPBACKS6
exit
!
